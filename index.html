<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hometown Map</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: 0.02em;
      color: #f1f5f9;
    }

    #map-container {
      width: 100%;
      max-width: 960px;
      background: #1e293b;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .state {
      fill: #334155;
      stroke: #475569;
      stroke-width: 0.5;
    }

    .city-dot {
      fill: #38bdf8;
      stroke: #0f172a;
      stroke-width: 1;
      cursor: pointer;
      transition: r 0.15s ease, fill 0.15s ease;
    }

    .city-dot:hover {
      fill: #f472b6;
      r: 7;
    }

    /* Tooltip */
    #tooltip {
      position: fixed;
      background: #1e293b;
      border: 1px solid #475569;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.8rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 10;
      white-space: nowrap;
    }

    #tooltip.visible { opacity: 1; }

    #tooltip .city-name { font-weight: 600; color: #f1f5f9; }
    #tooltip .city-state { color: #94a3b8; }

    /* City list */
    #city-list {
      width: 100%;
      max-width: 960px;
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .city-tag {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.75rem;
      color: #94a3b8;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .city-tag:hover, .city-tag.active {
      background: #38bdf8;
      border-color: #38bdf8;
      color: #0f172a;
      font-weight: 600;
    }
  </style>
</head>
<body>

<h1>Hometown Map</h1>
<div id="map-container">
  <svg id="map" viewBox="0 0 960 600"></svg>
</div>
<div id="city-list"></div>
<div id="tooltip"></div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<script>
// City data embedded inline so the page works when opened as a local file
const CITIES = [
  { "city": "Medford", "state": "NJ", "lat": 39.8872, "lng": -74.8315 },
  { "city": "Douglasville", "state": "GA", "lat": 33.7495, "lng": -84.7172 },
  { "city": "Newark", "state": "NJ", "lat": 40.7357, "lng": -74.1724 },
  { "city": "San Diego", "state": "CA", "lat": 32.7157, "lng": -117.1611 },
  { "city": "Grayslake", "state": "IL", "lat": 42.3442, "lng": -88.0423 },
  { "city": "Morristown", "state": "NJ", "lat": 40.7968, "lng": -74.4815 },
  { "city": "Pullman", "state": "WA", "lat": 46.7313, "lng": -117.1796 },
  { "city": "Longmont", "state": "CO", "lat": 40.1672, "lng": -105.1019 },
  { "city": "Buffalo", "state": "NY", "lat": 42.8864, "lng": -78.8784 },
  { "city": "Denver", "state": "CO", "lat": 39.7392, "lng": -104.9903 },
  { "city": "West Seneca", "state": "NY", "lat": 42.8317, "lng": -78.7517 },
  { "city": "Dover", "state": "OH", "lat": 40.5228, "lng": -81.4754 },
  { "city": "Riverside", "state": "CA", "lat": 33.9806, "lng": -117.3755 },
  { "city": "Portland", "state": "OR", "lat": 45.5152, "lng": -122.6784 },
  { "city": "Chevy Chase", "state": "MD", "lat": 38.9846, "lng": -77.0722 },
  { "city": "Indianapolis", "state": "IN", "lat": 39.7684, "lng": -86.1581 },
  { "city": "Atlanta", "state": "GA", "lat": 33.7490, "lng": -84.3880 },
  { "city": "Daytona Beach", "state": "FL", "lat": 29.2108, "lng": -81.0228 },
  { "city": "Kalamazoo", "state": "MI", "lat": 42.2917, "lng": -85.5872 },
  { "city": "St. Thomas", "state": "VI", "lat": 18.3333, "lng": -64.9167 },
  { "city": "Fort Wayne", "state": "IN", "lat": 41.0793, "lng": -85.1394 },
  { "city": "Bluffton", "state": "OH", "lat": 40.8939, "lng": -83.8924 },
  { "city": "Los Gatos", "state": "CA", "lat": 37.2266, "lng": -121.9747 },
  { "city": "Rice Lake", "state": "WI", "lat": 45.5033, "lng": -91.7377 },
  { "city": "Norwich", "state": "VT", "lat": 43.7153, "lng": -72.3079 },
  { "city": "Reno", "state": "NV", "lat": 39.5296, "lng": -119.8138 },
  { "city": "Rancho Palos Verdes", "state": "CA", "lat": 33.7445, "lng": -118.3870 },
  { "city": "Mount Vernon", "state": "NY", "lat": 40.9126, "lng": -73.8371 },
  { "city": "Missoula", "state": "MT", "lat": 46.8721, "lng": -113.9940 },
  { "city": "Kennett Square", "state": "PA", "lat": 39.8468, "lng": -75.7116 },
  { "city": "Bellwood", "state": "IL", "lat": 41.8842, "lng": -87.8828 },
  { "city": "Spring", "state": "TX", "lat": 30.0799, "lng": -95.4172 },
  { "city": "Houston", "state": "TX", "lat": 29.7604, "lng": -95.3698 },
  { "city": "The Woodlands", "state": "TX", "lat": 30.1658, "lng": -95.4613 },
  { "city": "Chicago", "state": "IL", "lat": 41.8781, "lng": -87.6298 },
  { "city": "Athens", "state": "GA", "lat": 33.9519, "lng": -83.3576 },
  { "city": "Durango", "state": "CO", "lat": 37.2753, "lng": -107.8801 },
  { "city": "Santa Rosa", "state": "CA", "lat": 38.4404, "lng": -122.7141 },
  { "city": "Grand Rapids", "state": "MI", "lat": 42.9634, "lng": -85.6681 },
  { "city": "Eden", "state": "UT", "lat": 41.3013, "lng": -111.8116 },
  { "city": "Vista", "state": "CA", "lat": 33.2000, "lng": -117.2425 },
  { "city": "Santee", "state": "CA", "lat": 32.8384, "lng": -116.9739 },
  { "city": "Beaverton", "state": "OR", "lat": 45.4871, "lng": -122.8037 },
  { "city": "Wichita Falls", "state": "TX", "lat": 33.9137, "lng": -98.4934 },
  { "city": "Hagerstown", "state": "MD", "lat": 39.6418, "lng": -77.7200 },
  { "city": "Claremont", "state": "CA", "lat": 34.0967, "lng": -117.7198 },
  { "city": "Charlotte", "state": "NC", "lat": 35.2271, "lng": -80.8431 },
  { "city": "Mansfield", "state": "TX", "lat": 32.5632, "lng": -97.1417 },
  { "city": "Dayton", "state": "OH", "lat": 39.7589, "lng": -84.1916 },
  { "city": "Westport", "state": "CT", "lat": 41.1415, "lng": -73.3579 }
];

(async () => {
  const width = 960, height = 600;
  const svg = d3.select("#map");

  // Only the TopoJSON needs a network fetch (CDN works fine from file://)
  const us = await fetch("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json").then(r => r.json());

  const cities = CITIES;

  const projection = d3.geoAlbersUsa()
    .scale(1300)
    .translate([width / 2, height / 2]);

  const path = d3.geoPath().projection(projection);

  // Draw states
  svg.append("g")
    .selectAll("path")
    .data(topojson.feature(us, us.objects.states).features)
    .join("path")
    .attr("class", "state")
    .attr("d", path);

  // State borders
  svg.append("path")
    .datum(topojson.mesh(us, us.objects.states, (a, b) => a !== b))
    .attr("fill", "none")
    .attr("stroke", "#64748b")
    .attr("stroke-width", 0.8)
    .attr("d", path);

  const tooltip = document.getElementById("tooltip");

  function showTooltip(event, d) {
    tooltip.innerHTML = `<span class="city-name">${d.city}</span><br><span class="city-state">${d.state}</span>`;
    tooltip.classList.add("visible");
    moveTooltip(event);
  }

  function moveTooltip(event) {
    tooltip.style.left = (event.clientX + 12) + "px";
    tooltip.style.top  = (event.clientY - 36) + "px";
  }

  function hideTooltip() {
    tooltip.classList.remove("visible");
  }

  // Draw city dots
  const dots = svg.append("g")
    .selectAll("circle")
    .data(cities.filter(d => projection([d.lng, d.lat]))) // exclude off-projection (VI)
    .join("circle")
    .attr("class", "city-dot")
    .attr("cx", d => projection([d.lng, d.lat])[0])
    .attr("cy", d => projection([d.lng, d.lat])[1])
    .attr("r", 5)
    .attr("data-city", d => d.city)
    .on("mousemove", (event, d) => { showTooltip(event, d); moveTooltip(event); })
    .on("mouseleave", hideTooltip);

  // City tag list
  const listEl = document.getElementById("city-list");
  cities.forEach(d => {
    const tag = document.createElement("span");
    tag.className = "city-tag";
    tag.textContent = `${d.city}, ${d.state}`;
    tag.addEventListener("mouseenter", () => {
      tag.classList.add("active");
      dots.filter(c => c.city === d.city)
        .attr("fill", "#f472b6")
        .attr("r", 8);
    });
    tag.addEventListener("mouseleave", () => {
      tag.classList.remove("active");
      dots.filter(c => c.city === d.city)
        .attr("fill", "#38bdf8")
        .attr("r", 5);
    });
    listEl.appendChild(tag);
  });
})();
</script>
</body>
</html>
